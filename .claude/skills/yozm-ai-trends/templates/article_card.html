<article class="article-card" style="--i:{{STAGGER}}" data-tags="{{TAGS}}">
  <div class="ac-head">
    <span class="ac-rank">{{RANK}}</span>
    <div class="ac-headmain">
      <div class="ac-metaline"><span class="ac-cat">{{CAT}}</span>{{BADGES}}</div>
      <h3 class="ac-title"><a href="{{URL}}" target="_blank" rel="noopener">{{TITLE}}</a></h3>
      <p class="ac-byline">{{AUTHORS}}</p>
    </div>
  </div>
  <p class="ac-oneliner">{{ONELINER}}</p>
  <div class="ac-summary">{{SUMMARY}}</div>
  <div class="ac-subline">{{META}}</div>
  <div class="chip-row">{{CHIPS}}</div>
  {{DETAIL}}
  <div class="link-group">{{LINKS}}</div>
</article>
