<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{TITLE}}</title>
<script>try{var t=localStorage.getItem('aipw-theme');if(t)document.documentElement.setAttribute('data-theme',t);}catch(e){}</script>
<link rel="stylesheet" href="{{ASSETS}}/style.css">
<link rel="icon" type="image/svg+xml" href="{{ASSETS}}/icon.svg">
<link rel="icon" type="image/png" sizes="32x32" href="{{ASSETS}}/favicon-32.png">
<link rel="apple-touch-icon" href="{{ASSETS}}/apple-touch-icon.png">
<link rel="manifest" href="{{ASSETS}}/manifest.json">
<meta name="theme-color" content="#2A2621">
<meta name="apple-mobile-web-app-title" content="요즘IT AI">
</head>
<body>

<div class="topbar">
  <a class="brand" href="{{ROOT}}/index.html"><span class="dot"></span>요즘IT AI 트렌드 <small>Observatory Log</small></a>
  <nav class="topnav">
    <a href="{{ROOT}}/index.html">전체</a>
    <button id="themeToggle" class="icon-btn" aria-label="다크/라이트 테마 전환" title="테마 전환">◐</button>
  </nav>
</div>

<header class="hero wrap">

  <h1 class="hero__title">{{HERO_TITLE}}</h1>
  <p class="hero__lede">{{LEDE}}</p>

      {{WEEK_CARDS}}

    <span>출처: 요즘IT 인기 글 (AI 관련) · 개인 학습용</span>

</main>
<script src="{{ASSETS}}/app.js"></script>

</html>
